<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NLU A6 — Chapter 5 RAG Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      background: #2c3e50;
      color: #fff;
      width: 100%;
      max-width: 800px;
      border-radius: 12px 12px 0 0;
      padding: 20px 24px;
    }

    header h1  { font-size: 1.4rem; }
    header p   { font-size: 0.85rem; opacity: 0.75; margin-top: 4px; }
    header .badge {
      display: inline-block;
      background: #e74c3c;
      color: #fff;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 6px;
    }

    #chat-window {
      background: #fff;
      width: 100%;
      max-width: 800px;
      height: 480px;
      overflow-y: auto;
      padding: 20px;
      border-left: 1px solid #ddd;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message { display: flex; flex-direction: column; max-width: 80%; }
    .message.user  { align-self: flex-end; align-items: flex-end; }
    .message.bot   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.5;
    }
    .message.user .bubble {
      background: #2c3e50;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.bot .bubble {
      background: #ecf0f1;
      color: #2c3e50;
      border-bottom-left-radius: 4px;
    }

    .sources {
      margin-top: 8px;
      font-size: 0.78rem;
      color: #888;
    }
    .sources details { cursor: pointer; }
    .sources summary { color: #3498db; font-weight: 600; }
    .source-item {
      background: #f8f9fa;
      border-left: 3px solid #3498db;
      padding: 8px 10px;
      margin-top: 6px;
      border-radius: 4px;
      font-size: 0.78rem;
      color: #555;
      white-space: pre-wrap;
    }

    .typing { font-size: 0.85rem; color: #aaa; font-style: italic; }

    #input-area {
      background: #fff;
      border: 1px solid #ddd;
      border-top: none;
      width: 100%;
      max-width: 800px;
      border-radius: 0 0 12px 12px;
      padding: 16px;
      display: flex;
      gap: 10px;
    }

    #question {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.92rem;
      outline: none;
      resize: none;
      height: 48px;
    }
    #question:focus { border-color: #2c3e50; }

    #send-btn {
      background: #2c3e50;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 0.92rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    #send-btn:hover    { background: #34495e; }
    #send-btn:disabled { background: #95a5a6; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <h1>📚 Chapter 5 — Logistic Regression QA Chatbot</h1>
  <p>NLU A6 · st126055 · Supanut Kompayak</p>
  <span class="badge">Contextual Retrieval</span>
</header>

<div id="chat-window">
  <div class="message bot">
    <div class="bubble">
      Hello! I am a QA chatbot based on <strong>Chapter 5: Logistic Regression</strong> from Jurafsky &amp; Martin's SLP3 textbook. Ask me anything about the chapter!
    </div>
  </div>
</div>

<div id="input-area">
  <textarea id="question" placeholder="Ask a question about Chapter 5..." rows="1"></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  const chatWindow = document.getElementById("chat-window");
  const questionEl = document.getElementById("question");
  const sendBtn    = document.getElementById("send-btn");

  questionEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function appendMessage(role, content, sources) {
    const msg = document.createElement("div");
    msg.className = `message ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;
    msg.appendChild(bubble);

    if (sources && sources.length > 0) {
      const srcDiv = document.createElement("div");
      srcDiv.className = "sources";
      const details = document.createElement("details");
      const summary = document.createElement("summary");
      summary.textContent = `📎 ${sources.length} source chunk(s) used`;
      details.appendChild(summary);
      sources.forEach((s, i) => {
        const item = document.createElement("div");
        item.className = "source-item";
        item.textContent = `[Source ${i+1} · similarity ${s.score}]\n${s.text.substring(0, 300)}...`;
        details.appendChild(item);
      });
      srcDiv.appendChild(details);
      msg.appendChild(srcDiv);
    }

    chatWindow.appendChild(msg);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function appendTyping() {
    const msg = document.createElement("div");
    msg.className = "message bot";
    msg.id = "typing-indicator";
    const bubble = document.createElement("div");
    bubble.className = "bubble typing";
    bubble.textContent = "Thinking…";
    msg.appendChild(bubble);
    chatWindow.appendChild(msg);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  async function sendMessage() {
    const question = questionEl.value.trim();
    if (!question) return;

    appendMessage("user", question, null);
    questionEl.value = "";
    sendBtn.disabled = true;
    appendTyping();

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      removeTyping();
      appendMessage("bot", data.answer || data.error, data.sources || []);
    } catch (err) {
      removeTyping();
      appendMessage("bot", "⚠️ Error connecting to the server.", null);
    } finally {
      sendBtn.disabled = false;
      questionEl.focus();
    }
  }
</script>
</body>
</html>
